<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SmileWare Admin</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #eef6ff;
      }

      .dashboard-container {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;

        width: 240px;
        height: 100vh;

        padding: 20px;

        background: #0a74c0;
        color: #fff;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        gap: 10px;

        margin-bottom: 25px;
      }

      .sidebar-header img {
        width: 45px;
        height: 45px;

        border-radius: 50%;
      }

      .sidebar ul {
        padding: 0;
      }

      .sidebar li {
        list-style: none;

        padding: 12px;
        margin-bottom: 10px;

        background: rgba(255, 255, 255, 0.1);

        border-radius: 8px;

        cursor: pointer;

        transition: 0.3s;
      }

      .sidebar li:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .main-content {
        width: 100%;
        margin-left: 260px;
        padding: 20px;
      }

      .cards {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

        gap: 20px;

        margin-bottom: 20px;
      }

      .card,
      .table-box {
        padding: 20px;

        background: #fff;

        border-radius: 14px;

        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);

        margin-bottom: 20px;
      }

      .card h3 {
        margin-bottom: 10px;
        color: #0a74c0;
      }

      .card p {
        font-size: 28px;
        font-weight: bold;
      }

      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;

        gap: 15px;

        margin-bottom: 15px;
      }

      .summary-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .summary-btn {
        padding: 10px 18px;

        background: #0a74c0;

        color: #fff;

        border: none;
        border-radius: 10px;

        cursor: pointer;

        transition: 0.3s;
      }

      .summary-btn:hover {
        background: #085d98;
      }

      .active-summary {
        background: #053d66;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;

        text-align: left;

        border-bottom: 1px solid #ddd;
      }

      th {
        background: #0a74c0;
        color: #fff;
      }

      select,
      input {
        padding: 8px;

        border: 1px solid #ccc;
        border-radius: 8px;

        outline: none;
      }

      input:focus,
      select:focus {
        border-color: #0a74c0;
      }

      .search-box {
        width: 250px;
        margin-top: 10px;
        padding: 10px;
      }

      .table-scroll {
        max-height: 420px;
        overflow-y: auto;
      }

      @media (max-width: 768px) {
        .dashboard-container {
          flex-direction: column;
        }

        .sidebar {
          position: relative;

          width: 100%;
          height: auto;
        }

        .main-content {
          margin-left: 0;
        }

        .table-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .search-box {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="dashboard-container">
      <div class="sidebar">
        <div class="sidebar-header">
          <img src="logo.png" alt="SmileWare Logo" />

          <h2>SmileWare</h2>
        </div>

        <ul>
          <li onclick="goTo('dashboard')">Dashboard</li>

          <li onclick="goTo('appointments')">Appointments</li>

          <li onclick="goTo('patients')">Patient Records</li>

          <li onclick="goTo('billing')">Billing</li>

          <li onclick="logout()">Logout</li>
        </ul>
      </div>

      <div class="main-content">
        <section id="dashboard">
          <div class="cards">
            <div class="card">
              <h3>Total Appointments</h3>

              <p id="todayCount">0</p>
            </div>

            <div class="card">
              <h3>Confirmed</h3>

              <p id="confirmedCount">0</p>
            </div>

            <div class="card">
              <h3>Pending</h3>

              <p id="pendingCount">0</p>
            </div>

            <div class="card">
              <h3>Arrived</h3>

              <p id="arrivedCount">0</p>
            </div>
          </div>
        </section>

        <section id="appointments" class="table-box">
          <div class="table-header">
            <h2>Appointments</h2>
          </div>

          <div class="table-scroll">
            <table id="appointmentTable"></table>
          </div>
        </section>

        <section id="patients" class="table-box">
          <div class="table-header">
            <div>
              <h2>Patient Records</h2>

              <input
                type="text"
                id="searchPatient"
                class="search-box"
                placeholder="Search patient..."
                onkeyup="loadAppointments()"
              />
            </div>

            <div class="summary-bar">
              <button class="summary-btn active-summary" data-filter="today">
                Today
              </button>

              <button class="summary-btn" data-filter="weekly">Weekly</button>

              <button class="summary-btn" data-filter="all">
                Appointment Summary
              </button>
            </div>
          </div>

          <div class="table-scroll">
            <table id="recordTable"></table>
          </div>
        </section>

        <section id="billing" class="table-box">
          <div class="table-header">
            <h2>Billing</h2>
          </div>

          <div class="table-scroll">
            <table id="billingTable"></table>
          </div>
        </section>
      </div>
    </div>

    <script src="adminjs.js"></script>
  </body>
</html>
